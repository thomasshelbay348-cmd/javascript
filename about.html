<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital and Analog Clock</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: sans-serif;
        }

        /* Toggle Button Styling */
        #toggleBtn {
            padding: 10px 20px;
            margin-bottom: 30px;
            cursor: pointer;
            background: #3498db;
            border: none;
            color: white;
            border-radius: 5px;
            font-weight: bold;
        }

        /* Digital Clock Styling */
        #digital-clock {
            font-size: 60px;
            font-family: 'Courier New', monospace;
            border: 4px solid #3498db;
            padding: 20px;
            border-radius: 10px;
        }

        /* Analog Clock Styling */
        #analog-clock {
            width: 250px;
            height: 250px;
            border: 8px solid #ecf0f1;
            border-radius: 50%;
            position: relative;
            display: none; /* Hidden by default */
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            background: white;
            border-radius: 10px;
        }

        .hour { width: 6px; height: 60px; margin-left: -3px; background: #e74c3c; }
        .minute { width: 4px; height: 90px; margin-left: -2px; }
        .second { width: 2px; height: 100px; margin-left: -1px; background: #3498db; }

        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <button id="toggleBtn">Switch to Analog</button>

    <!-- Digital Display -->
    <div id="digital-clock">00:00:00</div>

    <!-- Analog Display -->
    <div id="analog-clock">
        <div class="center-dot"></div>
        <div id="hour-hand" class="hand hour"></div>
        <div id="min-hand" class="hand minute"></div>
        <div id="sec-hand" class="hand second"></div>
    </div>

    <script>
        let isDigital = true;

        function updateClocks() {
            const now = new Date();
            
            // --- Digital Logic ---
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            const s = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('digital-clock').textContent = `${h}:${m}:${s}`;

            // --- Analog Logic ---
            // Calculate degrees: (Value / Max) * 360
            const sDeg = (now.getSeconds() / 60) * 360;
            const mDeg = (now.getMinutes() / 60) * 360 + (now.getSeconds() / 60) * 6;
            const hDeg = (now.getHours() % 12 / 12) * 360 + (now.getMinutes() / 60) * 30;

            document.getElementById('sec-hand').style.transform = `rotate(${sDeg}deg)`;
            document.getElementById('min-hand').style.transform = `rotate(${mDeg}deg)`;
            document.getElementById('hour-hand').style.transform = `rotate(${hDeg}deg)`;
        }

        // Toggle Switch Functionality
        document.getElementById('toggleBtn').addEventListener('click', () => {
            isDigital = !isDigital;
            const dClock = document.getElementById('digital-clock');
            const aClock = document.getElementById('analog-clock');
            const btn = document.getElementById('toggleBtn');

            if (isDigital) {
                dClock.style.display = 'block';
                aClock.style.display = 'none';
                btn.textContent = "Switch to Analog";
            } else {
                dClock.style.display = 'none';
                aClock.style.display = 'block';
                btn.textContent = "Switch to Digital";
            }
        });

        setInterval(updateClocks, 1000);
        updateClocks();
    </script>
</body>
</html>
