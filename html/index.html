<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend>form</legend>
        <h1>Farewell Party Survey Form</h1>
        <label for="name">Name: <input type="text" id="name" name="name" placeholder="Enter your name"></label><br><br>
        <label for="email">Email: <input type="email" id="email" name="email" placeholder="Enter your email"></label><br><br>
        <label for="age">Age: <input type="number" id="age" name="age" placeholder="Enter your age"></label><br><br>
        <p> which option best describes you?
        <select name="" id="">
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
            <option value="parent">Parent</option>
        </select>    
        </p>
        <p>will you attend the party?
        <input type="radio" id="attend" name="attend">
        <label for="attend">Yes</label>
        <input type="radio" id="attnd" name="attend">
        <label for="attnd">No</label>
        </p>
        <p>what did you like about program? <br>
            <input type="checkbox" id="typing" name="typing">
            <label for="typing"> Typing</label><br>
            <input type="checkbox" id="coding" name="coding">
            <label for="coding">The learning experience</label><br>
            <input type="checkbox" id="fun" name="fun">
            <label for="fun">Community Meetup</label><br>
            <input type="checkbox" id="other" name="other">
            <label for="other">Brown Bag Session</label><br>
            <input type="checkbox" id="programr" name="programr">
            <label for="programr">Program </label>
            
        </p>
        <p> Any comment or suggestions? </p>
        <textarea name="comments" id="comments" rows="4" cols="50" placeholder="Please share your thoughts..."></textarea> <br><br>
        <input type="reset" value="Reset">
        <input type="submit" value="Submit">
    </fieldset>
    
</body>
</html>
